services:
  - type: web
    name: qr-attendance-system-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: FRONTEND_URL
        value: https://adithyapkashyap-git.github.io/-qr-attendance-system/
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        value: QR Attendance System
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false

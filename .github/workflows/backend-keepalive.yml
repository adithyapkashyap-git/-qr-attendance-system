name: Keep Backend Awake

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Warm backend
        shell: bash
        run: |
          url="https://qr-attendance-system-q8yu.onrender.com/api/ping"
          attempts=8
          delay_seconds=20

          for attempt in $(seq 1 "$attempts"); do
            echo "Warm-up attempt ${attempt}/${attempts}"

            if curl --fail --silent --show-error --max-time 120 "$url"; then
              echo "Backend is reachable."
              exit 0
            fi

            if [ "$attempt" -lt "$attempts" ]; then
              echo "Backend still unavailable. Sleeping ${delay_seconds}s before retry..."
              sleep "$delay_seconds"
            fi
          done

          echo "Backend never became reachable after ${attempts} attempts." >&2
          exit 1
